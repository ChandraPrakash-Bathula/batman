<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Batcave — Chandra Prakash Bathula</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100% !important; height: 100% !important; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; font-family: 'Courier New', monospace;
  }

  #top-left {
    position: absolute; top: 24px; left: 28px;
    font-size: 11px; line-height: 2; color: #2a0000;
    text-transform: uppercase; letter-spacing: 1px;
  }
  #top-left .val { color: #5a0000; }

  #top-right {
    position: absolute; top: 24px; right: 28px;
    font-size: 10px; line-height: 2; color: #1a0000;
    text-transform: uppercase; letter-spacing: 1px; text-align: right;
  }

  #center-title {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; pointer-events: none;
    animation: fadein 2s ease forwards;
  }
  #center-title h1 {
    font-size: clamp(13px, 2vw, 18px);
    color: #550000; letter-spacing: 5px;
    text-transform: uppercase; font-weight: 700;
  }
  #center-title p {
    font-size: 10px; color: #2a0000;
    letter-spacing: 3px; margin-top: 6px;
    text-transform: uppercase;
  }

  #btns {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 10px; pointer-events: all;
  }
  .btn {
    font-family: 'Courier New', monospace; font-size: 10px;
    background: rgba(0,0,0,0.85); color: #330000;
    border: 1px solid #1a0000; padding: 7px 16px;
    cursor: pointer; letter-spacing: 1.5px; text-transform: uppercase;
    transition: all 0.25s;
  }
  .btn:hover { color: #880000; border-color: #550000; }
  .btn.active { color: #cc0000; border-color: #880000; background: rgba(10,0,0,0.95); }

  #scan-line {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  @keyframes fadein { from { opacity:0; transform: translate(-50%,-50%) scale(0.96); } to { opacity:1; transform: translate(-50%,-50%) scale(1); } }

  #vignette {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="scan-line"></div>
  <div id="vignette"></div>
  <div id="top-left">
    SYSTEM: <span class="val">BATCAVE OS v3.7</span><br>
    OPERATOR: <span class="val">CHANDRA PRAKASH</span><br>
    STATUS: <span class="val">ONLINE</span><br>
    WEATHER: <span class="val">HEAVY RAIN</span><br>
    THREAT: <span class="val">NONE DETECTED</span>
  </div>
  <div id="top-right">
    SLU FACULTY<br>
    AI DEVELOPER<br>
    ML RESEARCHER<br>
    300+ MENTORED<br>
    GPA 3.93 / 4.0
  </div>
  <div id="center-title">
    <h1>The Dark Knight Codes</h1>
    <p>Saint Louis University — Batcave</p>
  </div>
  <div id="btns">
    <button class="btn active" id="b1" onclick="setScene('signal')">[ BAT SIGNAL ]</button>
    <button class="btn" id="b2" onclick="setScene('mobile')">[ BATMOBILE ]</button>
    <button class="btn" id="b3" onclick="setScene('logo')">[ BAT LOGO ]</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── RENDERER ──────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.6;

// ── SCENE / FOG ────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020000);
scene.fog = new THREE.FogExp2(0x040000, 0.022);

// ── CAMERA ─────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 4, 16);
camera.lookAt(0, 1, 0);

// ── LIGHTS ─────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a0000, 1.5));

const redFill = new THREE.PointLight(0x330000, 2, 40);
redFill.position.set(-4, 6, 4);
scene.add(redFill);

const batSpot = new THREE.SpotLight(0xffffff, 1.2, 80, Math.PI / 9, 0.6, 1.2);
batSpot.position.set(0, 22, 2);
batSpot.castShadow = true;
batSpot.shadow.mapSize.set(1024, 1024);
scene.add(batSpot);
scene.add(batSpot.target);

const rimRed = new THREE.DirectionalLight(0x550000, 0.5);
rimRed.position.set(6, 3, -6);
scene.add(rimRed);

// ── GROUND ─────────────────────────────────────────────────
const gGeo = new THREE.PlaneGeometry(200, 200);
const gMat = new THREE.MeshStandardMaterial({ color: 0x050000, roughness: 1 });
const ground = new THREE.Mesh(gGeo, gMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -3;
ground.receiveShadow = true;
scene.add(ground);

// Wet ground reflection puddles
for (let i = 0; i < 12; i++) {
  const pGeo = new THREE.PlaneGeometry(Math.random()*2+0.5, Math.random()*1+0.3);
  const pMat = new THREE.MeshStandardMaterial({ color: 0x0a0000, roughness: 0.05, metalness: 0.9, transparent: true, opacity: 0.6 });
  const puddle = new THREE.Mesh(pGeo, pMat);
  puddle.rotation.x = -Math.PI / 2;
  puddle.position.set((Math.random()-0.5)*20, -2.98, (Math.random()-0.5)*14);
  scene.add(puddle);
}

// ── CITY SKYLINE ───────────────────────────────────────────
const bldData = [
  [-14,4,1.5],[-12,7,2],[-10,5,1.8],[-8,9,2.2],[-6,6,1.6],[-4,11,2.5],[-2,5,1.5],
  [0,4,1.8],[2,8,2],[4,5.5,1.7],[6,10,2.3],[8,6,1.5],[10,7,2],[12,4.5,1.6],[14,5,1.8]
];
bldData.forEach(([x,h,w]) => {
  const geo = new THREE.BoxGeometry(w, h, 2);
  const mat = new THREE.MeshStandardMaterial({ color: 0x030000, roughness: 0.95, metalness: 0.05 });
  const b = new THREE.Mesh(geo, mat);
  b.position.set(x, h/2-3, -14);
  b.receiveShadow = true;
  scene.add(b);
  // Red window glow dots
  for (let r=0; r < Math.floor(h/1.5); r++) {
    for (let c=0; c < 2; c++) {
      if (Math.random() > 0.45) continue;
      const wGeo = new THREE.PlaneGeometry(0.12, 0.16);
      const wMat = new THREE.MeshBasicMaterial({ color: Math.random()>0.7 ? 0x220000 : 0x110000, transparent:true, opacity: Math.random()*0.4+0.2 });
      const win = new THREE.Mesh(wGeo, wMat);
      win.position.set(x + (c-0.5)*0.5, -3 + r*1.3 + 0.8, -12.9);
      scene.add(win);
    }
  }
});

// ── MOON ───────────────────────────────────────────────────
const moonGeo = new THREE.SphereGeometry(1.8, 20, 20);
const moonMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, emissive: 0x0a0000, emissiveIntensity: 0.1 });
const moon = new THREE.Mesh(moonGeo, moonMat);
moon.position.set(5, 11, -18);
scene.add(moon);

// Moon halo
const haloGeo = new THREE.RingGeometry(2.0, 3.5, 32);
const haloMat = new THREE.MeshBasicMaterial({ color: 0x0d0000, side: THREE.DoubleSide, transparent: true, opacity: 0.25 });
const halo = new THREE.Mesh(haloGeo, haloMat);
halo.position.set(5, 11, -17.9);
scene.add(halo);

// ── RAIN SYSTEM ────────────────────────────────────────────
const RAIN_COUNT = 2000;
const rainGeo = new THREE.BufferGeometry();
const rainPos = new Float32Array(RAIN_COUNT * 3);
const rainVel = new Float32Array(RAIN_COUNT);
for (let i = 0; i < RAIN_COUNT; i++) {
  rainPos[i*3]   = (Math.random()-0.5)*50;
  rainPos[i*3+1] = Math.random()*28 - 4;
  rainPos[i*3+2] = (Math.random()-0.5)*30;
  rainVel[i] = 0.18 + Math.random()*0.18;
}
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
const rainMat = new THREE.PointsMaterial({ color: 0x110000, size: 0.06, transparent: true, opacity: 0.55 });
const rain = new THREE.Points(rainGeo, rainMat);
scene.add(rain);

// ── STARS / DUST ───────────────────────────────────────────
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(400*3);
for (let i=0;i<400;i++){
  dustPos[i*3]=(Math.random()-0.5)*100; dustPos[i*3+1]=Math.random()*30+8; dustPos[i*3+2]=(Math.random()-0.5)*80;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
scene.add(new THREE.Points(dustGeo, new THREE.PointsMaterial({color:0x110000,size:0.05,transparent:true,opacity:0.3})));

// ── BAT SHAPE HELPER ───────────────────────────────────────
function makeBatShape() {
  const s = new THREE.Shape();
  s.moveTo(0, 0.1);
  s.bezierCurveTo(-0.2, 0.6, -1.0, 1.1, -2.4, 0.9);
  s.bezierCurveTo(-1.9, 0.5, -1.6, 0.7, -1.1, 0.5);
  s.bezierCurveTo(-1.5, 0.2, -2.2, -0.2, -2.9, -0.1);
  s.bezierCurveTo(-2.2, -0.4, -1.4, -0.1, -0.9, -0.25);
  s.bezierCurveTo(-0.7, -0.65, -0.25, -0.85, 0, -0.55);
  s.bezierCurveTo(0.25, -0.85, 0.7, -0.65, 0.9, -0.25);
  s.bezierCurveTo(1.4, -0.1, 2.2, -0.4, 2.9, -0.1);
  s.bezierCurveTo(2.2, -0.2, 1.5, 0.2, 1.1, 0.5);
  s.bezierCurveTo(1.6, 0.7, 1.9, 0.5, 2.4, 0.9);
  s.bezierCurveTo(1.0, 1.1, 0.2, 0.6, 0, 0.1);
  return s;
}

// ─────────────────────────────────────────────────────────
// SCENE A — BAT SIGNAL
// ─────────────────────────────────────────────────────────
const sceneA = new THREE.Group();

// Pole
const poleGeo = new THREE.CylinderGeometry(0.08, 0.12, 3.5, 8);
const metalMat = new THREE.MeshStandardMaterial({ color:0x0d0000, roughness:0.5, metalness:0.8 });
const pole = new THREE.Mesh(poleGeo, metalMat);
pole.position.set(0,-1.2,0); pole.castShadow=true;
sceneA.add(pole);

// Housing
const hsGeo = new THREE.CylinderGeometry(0.9, 0.9, 0.6, 20);
const hsMat = new THREE.MeshStandardMaterial({ color:0x0a0000, roughness:0.35, metalness:0.9, emissive:0x0a0000, emissiveIntensity:0.2 });
const housing = new THREE.Mesh(hsGeo, hsMat);
housing.position.set(0,0.6,0); housing.castShadow=true;
sceneA.add(housing);

// Lens ring
const lensGeo = new THREE.TorusGeometry(0.85, 0.09, 8, 24);
const lensMat = new THREE.MeshStandardMaterial({ color:0x1a0000, roughness:0.2, metalness:1.0 });
const lens = new THREE.Mesh(lensGeo, lensMat);
lens.position.set(0,0.9,0);
sceneA.add(lens);

// Cone beam
const beamGeo = new THREE.ConeGeometry(4.5, 16, 36, 1, true);
const beamMat = new THREE.MeshBasicMaterial({ color:0x0d0000, transparent:true, opacity:0.1, side:THREE.DoubleSide });
const beam = new THREE.Mesh(beamGeo, beamMat);
beam.position.set(0,9.9,0); beam.rotation.x=Math.PI;
sceneA.add(beam);

// Glow disk at top of beam (cloud)
const cloudGeo = new THREE.SphereGeometry(5, 20, 10);
const cloudMat = new THREE.MeshBasicMaterial({ color:0x0d0000, transparent:true, opacity:0.22, side:THREE.BackSide });
const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
cloudMesh.position.set(0,18,0); cloudMesh.scale.set(2.2,0.4,1.2);
sceneA.add(cloudMesh);

// Bat silhouette in beam
const batMeshA = new THREE.Mesh(
  new THREE.ShapeGeometry(makeBatShape()),
  new THREE.MeshBasicMaterial({ color:0x000000, side:THREE.DoubleSide })
);
batMeshA.scale.set(1.8,1.8,1); batMeshA.position.set(0,17.5,0.1);
sceneA.add(batMeshA);

// Red glow point inside housing
const sigGlow = new THREE.PointLight(0x330000, 3, 12);
sigGlow.position.set(0,1,0);
sceneA.add(sigGlow);

scene.add(sceneA);

// ─────────────────────────────────────────────────────────
// SCENE B — BATMOBILE
// ─────────────────────────────────────────────────────────
const sceneB = new THREE.Group();
sceneB.visible = false;

const carMat = new THREE.MeshStandardMaterial({ color:0x060000, roughness:0.25, metalness:0.95 });
const darkRedMat = new THREE.MeshStandardMaterial({ color:0x0d0000, roughness:0.4, metalness:0.8 });

// Main body — low wedge
const bodyGeo = new THREE.BoxGeometry(5.8, 0.55, 2.2);
const bodyMesh = new THREE.Mesh(bodyGeo, carMat);
bodyMesh.position.y = -0.4; bodyMesh.castShadow=true;
sceneB.add(bodyMesh);

// Nose cone (front taper)
const nosePts = [new THREE.Vector2(0,0),new THREE.Vector2(0.28,0),new THREE.Vector2(0,1.1)];
const noseGeo = new THREE.LatheGeometry(nosePts,8);
const noseMesh = new THREE.Mesh(noseGeo, carMat);
noseMesh.rotation.z = -Math.PI/2; noseMesh.position.set(3.3,-0.4,0); noseMesh.scale.set(1,0.5,0.5);
sceneB.add(noseMesh);

// Cockpit bubble
const cockGeo = new THREE.SphereGeometry(0.72,16,10,0,Math.PI*2,0,Math.PI/2);
const cockMat = new THREE.MeshStandardMaterial({ color:0x0a0000, roughness:0.05, metalness:0.9, transparent:true, opacity:0.8 });
const cockpit = new THREE.Mesh(cockGeo, cockMat);
cockpit.position.set(-0.2,0.1,0); cockpit.castShadow=true;
sceneB.add(cockpit);

// Back turbine
const turbGeo = new THREE.CylinderGeometry(0.55,0.32,1.5,14);
const turbMesh = new THREE.Mesh(turbGeo, darkRedMat);
turbMesh.rotation.z=Math.PI/2; turbMesh.position.set(-3.1,-0.15,0);
sceneB.add(turbMesh);

// Jet fire glow
const jetGeo = new THREE.SphereGeometry(0.3,10,10);
const jetMat = new THREE.MeshBasicMaterial({ color:0x660000, transparent:true, opacity:0.85 });
const jet = new THREE.Mesh(jetGeo, jetMat);
jet.position.set(-4.1,-0.15,0);
sceneB.add(jet);
const jetLight = new THREE.PointLight(0x880000, 3, 6);
jetLight.position.copy(jet.position);
sceneB.add(jetLight);

// Side fins
[-0.85,0.85].forEach(z=>{
  const fShape = new THREE.Shape();
  fShape.moveTo(0,0); fShape.lineTo(-1.5,0); fShape.lineTo(-1.5,1.4); fShape.lineTo(0,0);
  const fin = new THREE.Mesh(new THREE.ShapeGeometry(fShape), darkRedMat);
  fin.position.set(-1.5,-0.12,z); fin.castShadow=true;
  sceneB.add(fin);
});

// Bat wing spoilers
const wShape = new THREE.Shape();
wShape.moveTo(0,0); wShape.bezierCurveTo(-0.5,0.4,-1.2,0.8,-2,0.5);
wShape.bezierCurveTo(-1.5,0.1,-1,0.3,-0.5,0.1); wShape.lineTo(0,0);
[-0.8,0.8].forEach((z,i)=>{
  const w = new THREE.Mesh(new THREE.ShapeGeometry(wShape), carMat);
  w.position.set(-0.8,0.12,z); w.rotation.y = i===1 ? Math.PI : 0;
  sceneB.add(w);
});

// Wheels
[[1.6,1.15],[1.6,-1.15],[-1.5,1.15],[-1.5,-1.15]].forEach(([x,z])=>{
  const wGeo = new THREE.CylinderGeometry(0.58,0.58,0.38,18);
  const wMesh = new THREE.Mesh(wGeo, new THREE.MeshStandardMaterial({color:0x080000,roughness:0.9,metalness:0.2}));
  wMesh.rotation.x=Math.PI/2; wMesh.position.set(x,-0.88,z); wMesh.castShadow=true;
  sceneB.add(wMesh);
  const rim = new THREE.Mesh(new THREE.TorusGeometry(0.4,0.07,6,18), darkRedMat);
  rim.rotation.x=Math.PI/2; rim.position.set(x,-0.88,z);
  sceneB.add(rim);
});

sceneB.position.set(0,-0.4,0);
sceneB.rotation.y = 0.35;
scene.add(sceneB);

// ─────────────────────────────────────────────────────────
// SCENE C — BAT LOGO (3D extruded, floating)
// ─────────────────────────────────────────────────────────
const sceneC = new THREE.Group();
sceneC.visible = false;

const extSettings = { depth:0.22, bevelEnabled:true, bevelSize:0.05, bevelThickness:0.05, bevelSegments:4 };
const bigBat = new THREE.Mesh(
  new THREE.ExtrudeGeometry(makeBatShape(), extSettings),
  new THREE.MeshStandardMaterial({ color:0x0a0000, roughness:0.2, metalness:0.95, emissive:0x1a0000, emissiveIntensity:0.3 })
);
bigBat.scale.set(2.4,2.4,2.4);
bigBat.position.set(-2.4*0, 0.5, 0);
bigBat.castShadow=true;
sceneC.add(bigBat);

// Red glow underneath logo
const logoGlow = new THREE.PointLight(0x880000, 4, 10);
logoGlow.position.set(0,-1,1);
sceneC.add(logoGlow);

// Orbiting rings
[3.2,4.0,4.9].forEach((r,i)=>{
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(r, 0.035, 4, 64),
    new THREE.MeshBasicMaterial({ color: i===0?0x330000:0x1a0000, transparent:true, opacity:0.5-i*0.12 })
  );
  ring.rotation.x = Math.PI/2 + i*0.35;
  sceneC.add(ring);
});

// Floating particles around logo
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(80*3);
for(let i=0;i<80;i++){
  const a=Math.random()*Math.PI*2, rad=3+Math.random()*3;
  pPos[i*3]=Math.cos(a)*rad; pPos[i*3+1]=(Math.random()-0.5)*3; pPos[i*3+2]=Math.sin(a)*rad*0.5;
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
sceneC.add(new THREE.Points(pGeo, new THREE.PointsMaterial({color:0x330000,size:0.06,transparent:true,opacity:0.6})));

scene.add(sceneC);

// ── SCENE SWITCHER ─────────────────────────────────────────
let current = 'signal';
const camTargets = {
  signal: { pos:[0,4,16], look:[0,2,0] },
  mobile: { pos:[5,2,13], look:[0,0,0] },
  logo:   { pos:[0,1,12], look:[0,0.5,0] }
};

function setScene(name) {
  current = name;
  sceneA.visible = name==='signal';
  sceneB.visible = name==='mobile';
  sceneC.visible = name==='logo';
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  document.getElementById({signal:'b1',mobile:'b2',logo:'b3'}[name]).classList.add('active');
}
window.setScene = setScene;

// ── MOUSE / TOUCH ──────────────────────────────────────────
let mx=0, my=0;
window.addEventListener('mousemove', e=>{
  mx = (e.clientX/window.innerWidth - 0.5)*2;
  my = -(e.clientY/window.innerHeight - 0.5)*2;
});
window.addEventListener('touchmove', e=>{
  mx = (e.touches[0].clientX/window.innerWidth - 0.5)*2;
  my = -(e.touches[0].clientY/window.innerHeight - 0.5)*2;
},{passive:true});

// ── ANIMATE ────────────────────────────────────────────────
let t=0;
const targetCam = new THREE.Vector3();
const targetLook = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  t += 0.007;

  // Update rain
  const rp = rain.geometry.attributes.position.array;
  for(let i=0;i<RAIN_COUNT;i++){
    rp[i*3+1] -= rainVel[i];
    rp[i*3]   -= rainVel[i]*0.15;
    if(rp[i*3+1] < -4) { rp[i*3+1]=24; rp[i*3]=(Math.random()-0.5)*50; }
  }
  rain.geometry.attributes.position.needsUpdate=true;

  // Scene A — signal
  if(current==='signal'){
    sceneA.rotation.y = Math.sin(t*0.25)*0.12 + mx*0.06;
    beam.material.opacity = 0.07 + Math.sin(t*1.8)*0.025;
    sigGlow.intensity = 2.5 + Math.sin(t*3)*0.8;
    cloudMesh.material.opacity = 0.18 + Math.sin(t*1.2)*0.05;
    batSpot.target.position.set(Math.sin(t*0.3)*1.5, 0, 0);
  }

  // Scene B — batmobile
  if(current==='mobile'){
    sceneB.rotation.y = 0.35 + Math.sin(t*0.4)*0.06 + mx*0.06;
    const flicker = 0.6 + Math.sin(t*6)*0.35;
    jet.material.opacity = flicker;
    jetLight.intensity = flicker * 4;
    jetLight.color.setRGB(0.5+Math.sin(t*6)*0.1, 0, 0);
  }

  // Scene C — logo
  if(current==='logo'){
    bigBat.rotation.y = t*0.35;
    bigBat.position.y = 0.5 + Math.sin(t*0.9)*0.35;
    sceneC.children.forEach((c,i)=>{
      if(c.geometry && c.geometry.type==='TorusGeometry'){
        c.rotation.z = t*(0.28+i*0.12);
        c.rotation.x = Math.PI/2 + Math.sin(t*0.35+i)*0.28;
      }
    });
    logoGlow.intensity = 3+Math.sin(t*2)*1.5;
  }

  // Camera smooth follow
  const ct = camTargets[current];
  targetCam.set(ct.pos[0]+mx*0.6, ct.pos[1]+my*0.3, ct.pos[2]);
  targetLook.set(ct.look[0], ct.look[1], ct.look[2]);
  camera.position.lerp(targetCam, 0.04);

  const curLook = new THREE.Vector3(); camera.getWorldDirection(curLook);
  const dir = targetLook.clone().sub(camera.position).normalize();
  camera.lookAt(camera.position.clone().add(curLook.lerp(dir,0.05)));

  // Red fill pulse
  redFill.intensity = 1.8 + Math.sin(t*0.7)*0.6;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
