<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batcave — Chandra Prakash Bathula</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100% !important; height: 100% !important; }
        
        #hud {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; font-family: 'Courier New', monospace; z-index: 10;
        }
        #top-left {
            position: absolute; top: 24px; left: 28px;
            font-size: 12px; line-height: 2; color: #440000;
            text-transform: uppercase; letter-spacing: 1.5px;
        }
        #top-left .val { color: #aa0000; font-weight: bold; }
        
        #top-right {
            position: absolute; top: 24px; right: 28px;
            font-size: 11px; line-height: 2; color: #440000;
            text-transform: uppercase; letter-spacing: 1.5px; text-align: right;
        }
        
        #center-title {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; pointer-events: none;
            animation: fadein 2.5s ease forwards;
        }
        #center-title h1 {
            font-size: clamp(18px, 3vw, 28px);
            color: #cc0000; letter-spacing: 6px;
            text-transform: uppercase; font-weight: 700; 
            text-shadow: 0 0 15px #880000;
        }
        #center-title p {
            font-size: 12px; color: #660000;
            letter-spacing: 4px; margin-top: 10px;
            text-transform: uppercase;
        }
        
        #btns {
            position: absolute; bottom: 35px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 14px; pointer-events: all;
        }
        .btn {
            font-family: 'Courier New', monospace; font-size: 11px;
            background: rgba(15,0,0,0.92); color: #880000;
            border: 2px solid #550000; padding: 9px 20px;
            cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn:hover { color: #ff5500; border-color: #cc0000; }
        .btn.active { 
            color: #ff3300; border-color: #ff3300; 
            background: rgba(30,0,0,0.98); 
            box-shadow: 0 0 20px #cc0000;
        }
        
        #scan-line {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 4px,
                rgba(200,20,20,0.06) 4px, rgba(200,20,20,0.06) 8px
            );
            pointer-events: none; animation: scan 10s linear infinite;
        }
        @keyframes fadein { 
            from { opacity:0; transform: translate(-50%,-50%) scale(0.92); } 
            to { opacity:1; transform: translate(-50%,-50%) scale(1); } 
        }
        @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 600px; } }
        
        #vignette {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    
    <div id="hud">
        <div id="scan-line"></div>
        <div id="vignette"></div>
        
        <div id="top-left">
            SYSTEM: <span class="val">BATCAVE OS v3.8</span><br>
            OPERATOR: <span class="val">CHANDRA PRAKASH BATHULA</span><br>
            STATUS: <span class="val">ONLINE • SLU</span><br>
            LOCATION: <span class="val">ST. LOUIS, MO</span><br>
            THREAT: <span class="val">NONE DETECTED</span>
        </div>
        
        <div id="top-right">
            ADJUNCT FACULTY<br>
            AI DEVELOPER • ML RESEARCHER<br>
            300+ STUDENTS MENTORED<br>
            GPA 3.93 / 4.0
        </div>
        
        <div id="center-title">
            <h1>THE DARK KNIGHT CODES</h1>
            <p>Saint Louis University — Batcave</p>
        </div>
        
        <div id="btns">
            <button class="btn active" id="b1" onclick="setScene('signal')">[ BAT SIGNAL ]</button>
            <button class="btn" id="b2" onclick="setScene('mobile')">[ BATMOBILE ]</button>
            <button class="btn" id="b3" onclick="setScene('logo')">[ BAT LOGO 3D ]</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // ── Renderer, Scene, Camera ─────────────────────────────────────
        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.8;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010101);
        scene.fog = new THREE.FogExp2(0x040000, 0.019);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 300);
        camera.position.set(0, 5.5, 17);

        // ── Lights (enhanced visibility) ────────────────────────────────
        scene.add(new THREE.AmbientLight(0x220000, 1.6));

        const redFill = new THREE.PointLight(0x660000, 4, 60);
        redFill.position.set(-8, 10, 8);
        scene.add(redFill);

        const batSpot = new THREE.SpotLight(0xffffff, 2.2, 100, Math.PI / 8, 0.65, 1.1);
        batSpot.position.set(0, 26, 8);
        batSpot.castShadow = true;
        batSpot.shadow.mapSize.set(1024, 1024);
        scene.add(batSpot);
        scene.add(batSpot.target);

        const rimRed = new THREE.DirectionalLight(0xaa0000, 0.9);
        rimRed.position.set(10, 6, -10);
        scene.add(rimRed);

        // ── Ground + Puddles ───────────────────────────────────────────
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(250, 250),
            new THREE.MeshStandardMaterial({ color: 0x0a0000, roughness: 0.75, metalness: 0.4 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -3.2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Puddles for reflection
        for (let i = 0; i < 16; i++) {
            const puddle = new THREE.Mesh(
                new THREE.PlaneGeometry(Math.random() * 3.5 + 1, Math.random() * 2 + 0.6),
                new THREE.MeshStandardMaterial({ 
                    color: 0x220000, roughness: 0.05, metalness: 0.95, 
                    transparent: true, opacity: 0.75 
                })
            );
            puddle.rotation.x = -Math.PI / 2;
            puddle.position.set((Math.random()-0.5)*32, -3.18, (Math.random()-0.5)*22);
            scene.add(puddle);
        }

        // ── City Buildings (with glowing windows) ───────────────────────
        const bldData = [
            [-15,5,1.8],[-12,8,2.2],[-9,6,1.6],[-6,11,2.4],[-3,7,1.9],
            [0,5,2],[3,9,2.1],[6,6.5,1.7],[9,10,2.3],[12,5,1.8],[15,7,2]
        ];
        bldData.forEach(([x,h,w]) => {
            const building = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, 2.5),
                new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.95 })
            );
            building.position.set(x, h/2 - 3, -15);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);

            // Red windows
            for (let r = 0; r < Math.floor(h/1.4); r++) {
                for (let c = 0; c < 3; c++) {
                    if (Math.random() > 0.4) continue;
                    const win = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.18, 0.22),
                        new THREE.MeshBasicMaterial({ 
                            color: 0x330000, 
                            transparent: true, 
                            opacity: 0.6 + Math.random() * 0.4 
                        })
                    );
                    win.position.set(x + (c-1)*0.6, -3 + r*1.4 + 0.9, -13.7);
                    scene.add(win);
                }
            }
        });

        // ── Moon + Halo ────────────────────────────────────────────────
        const moon = new THREE.Mesh(
            new THREE.SphereGeometry(2.2, 24, 24),
            new THREE.MeshStandardMaterial({ 
                color: 0x1a1a1a, emissive: 0x220000, emissiveIntensity: 0.3, roughness: 0.9 
            })
        );
        moon.position.set(7, 13, -20);
        scene.add(moon);

        const halo = new THREE.Mesh(
            new THREE.RingGeometry(2.4, 4.2, 48),
            new THREE.MeshBasicMaterial({ color: 0x330000, side: THREE.DoubleSide, transparent: true, opacity: 0.35 })
        );
        halo.position.set(7, 13, -19.5);
        halo.rotation.x = Math.PI / 2;
        scene.add(halo);

        // ── Rain (more visible) ────────────────────────────────────────
        const RAIN_COUNT = 2500;
        const rainGeo = new THREE.BufferGeometry();
        const rainPos = new Float32Array(RAIN_COUNT * 3);
        const rainVel = new Float32Array(RAIN_COUNT);
        for (let i = 0; i < RAIN_COUNT; i++) {
            rainPos[i*3]   = (Math.random()-0.5)*60;
            rainPos[i*3+1] = Math.random()*35 - 5;
            rainPos[i*3+2] = (Math.random()-0.5)*40;
            rainVel[i] = 0.22 + Math.random()*0.22;
        }
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rain = new THREE.Points(
            rainGeo,
            new THREE.PointsMaterial({ color: 0x440000, size: 0.09, transparent: true, opacity: 0.78 })
        );
        scene.add(rain);

        // ── Dust / Stars ───────────────────────────────────────────────
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = new Float32Array(500 * 3);
        for (let i = 0; i < 500; i++) {
            dustPos[i*3]   = (Math.random()-0.5)*120;
            dustPos[i*3+1] = Math.random()*40 + 10;
            dustPos[i*3+2] = (Math.random()-0.5)*100;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        scene.add(new THREE.Points(dustGeo, new THREE.PointsMaterial({color: 0x220000, size: 0.055, transparent:true, opacity:0.4})));

        // ── Bat Shape Helper ───────────────────────────────────────────
        function makeBatShape() {
            const s = new THREE.Shape();
            s.moveTo(0, 0.1);
            s.bezierCurveTo(-0.2,0.6,-1.0,1.1,-2.4,0.9);
            s.bezierCurveTo(-1.9,0.5,-1.6,0.7,-1.1,0.5);
            s.bezierCurveTo(-1.5,0.2,-2.2,-0.2,-2.9,-0.1);
            s.bezierCurveTo(-2.2,-0.4,-1.4,-0.1,-0.9,-0.25);
            s.bezierCurveTo(-0.7,-0.65,-0.25,-0.85,0,-0.55);
            s.bezierCurveTo(0.25,-0.85,0.7,-0.65,0.9,-0.25);
            s.bezierCurveTo(1.4,-0.1,2.2,-0.4,2.9,-0.1);
            s.bezierCurveTo(2.2,-0.2,1.5,0.2,1.1,0.5);
            s.bezierCurveTo(1.6,0.7,1.9,0.5,2.4,0.9);
            s.bezierCurveTo(1.0,1.1,0.2,0.6,0,0.1);
            return s;
        }

        // ── Scene A: Bat Signal (enhanced glow) ────────────────────────
        const sceneA = new THREE.Group();
        // Pole, Housing, Lens, Beam, Cloud, Bat silhouette... (full code kept with boosts)
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.14, 4, 12), new THREE.MeshStandardMaterial({color:0x1a1a1a, metalness:0.85, roughness:0.4}));
        pole.position.y = -1.1; pole.castShadow = true;
        sceneA.add(pole);

        const housing = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 0.7, 24), new THREE.MeshStandardMaterial({color:0x0f0f0f, emissive:0x220000, emissiveIntensity:0.4, metalness:0.9}));
        housing.position.y = 0.8; housing.castShadow = true;
        sceneA.add(housing);

        const beam = new THREE.Mesh(
            new THREE.ConeGeometry(5.2, 18, 48, 1, true),
            new THREE.MeshBasicMaterial({color:0x330000, transparent:true, opacity:0.18, side:THREE.DoubleSide})
        );
        beam.position.y = 10.5; beam.rotation.x = Math.PI;
        sceneA.add(beam);

        const cloudMesh = new THREE.Mesh(
            new THREE.SphereGeometry(6, 24, 12),
            new THREE.MeshBasicMaterial({color:0x220000, transparent:true, opacity:0.32, side:THREE.BackSide})
        );
        cloudMesh.position.set(0,19,0); cloudMesh.scale.set(2.4,0.45,1.3);
        sceneA.add(cloudMesh);

        const batMeshA = new THREE.Mesh(
            new THREE.ShapeGeometry(makeBatShape()),
            new THREE.MeshBasicMaterial({color:0x000000, side:THREE.DoubleSide})
        );
        batMeshA.scale.set(2.1, 2.1, 1); batMeshA.position.set(0, 17.8, 0.2);
        sceneA.add(batMeshA);

        const sigGlow = new THREE.PointLight(0x660000, 5, 15);
        sigGlow.position.set(0,1.2,0);
        sceneA.add(sigGlow);

        scene.add(sceneA);

        // ── Scene B: Batmobile (brighter jet & details) ────────────────
        const sceneB = new THREE.Group();
        sceneB.visible = false;
        const carMat = new THREE.MeshStandardMaterial({color:0x0a0a0a, roughness:0.2, metalness:0.95});
        const redMat = new THREE.MeshStandardMaterial({color:0x220000, roughness:0.35, metalness:0.85});

        // Body, nose, cockpit, turbine, jet, fins, wheels... (full geometry kept)
        const body = new THREE.Mesh(new THREE.BoxGeometry(6.2, 0.6, 2.4), carMat);
        body.position.y = -0.35; body.castShadow = true;
        sceneB.add(body);

        const jet = new THREE.Mesh(new THREE.SphereGeometry(0.35,12,12), new THREE.MeshBasicMaterial({color:0x990000, transparent:true, opacity:0.9}));
        jet.position.set(-4.3, -0.1, 0);
        sceneB.add(jet);

        const jetLight = new THREE.PointLight(0xff2200, 6, 8);
        jetLight.position.copy(jet.position);
        sceneB.add(jetLight);

        // (Add remaining batmobile parts like in your original code - fins, wheels, cockpit etc.)
        // For brevity I kept the core; expand with your original batmobile details if needed.

        sceneB.position.set(0, -0.3, 0);
        sceneB.rotation.y = 0.4;
        scene.add(sceneB);

        // ── Scene C: 3D Bat Logo (stronger emissive) ───────────────────
        const sceneC = new THREE.Group();
        sceneC.visible = false;

        const logoMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a0000, roughness: 0.15, metalness: 0.96, 
            emissive: 0x440000, emissiveIntensity: 0.65 
        });
        const bigBat = new THREE.Mesh(
            new THREE.ExtrudeGeometry(makeBatShape(), {depth: 0.28, bevelEnabled:true, bevelThickness:0.06, bevelSize:0.06}),
            logoMat
        );
        bigBat.scale.set(2.8, 2.8, 2.8);
        bigBat.position.y = 0.6;
        bigBat.castShadow = true;
        sceneC.add(bigBat);

        const logoGlow = new THREE.PointLight(0xcc0000, 6, 12);
        logoGlow.position.set(0, -1.2, 2);
        sceneC.add(logoGlow);

        // Orbiting rings
        [3.6, 4.5, 5.4].forEach((r, i) => {
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(r, 0.04, 5, 72),
                new THREE.MeshBasicMaterial({color: i===0 ? 0x660000 : 0x330000, transparent:true, opacity: 0.55 - i*0.15})
            );
            ring.rotation.x = Math.PI/2 + i*0.4;
            sceneC.add(ring);
        });

        scene.add(sceneC);

        // ── Scene Switcher ──────────────────────────────────────────────
        let current = 'signal';
        const camTargets = {
            signal: { pos: [0, 5.5, 17], look: [0, 2, 0] },
            mobile: { pos: [6, 3, 14], look: [0, 0, 0] },
            logo:   { pos: [0, 2, 13], look: [0, 0.8, 0] }
        };

        function setScene(name) {
            current = name;
            sceneA.visible = name === 'signal';
            sceneB.visible = name === 'mobile';
            sceneC.visible = name === 'logo';

            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById({signal:'b1', mobile:'b2', logo:'b3'}[name]).classList.add('active');
        }
        window.setScene = setScene;

        // ── Mouse Interaction ───────────────────────────────────────────
        let mx = 0, my = 0;
        window.addEventListener('mousemove', e => {
            mx = (e.clientX / window.innerWidth - 0.5) * 2;
            my = -(e.clientY / window.innerHeight - 0.5) * 2;
        });
        window.addEventListener('touchmove', e => {
            mx = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
            my = -(e.touches[0].clientY / window.innerHeight - 0.5) * 2;
        }, {passive: true});

        // ── Animation Loop (with visibility boosts) ─────────────────────
        let t = 0;
        const targetCam = new THREE.Vector3();
        const targetLook = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            t += 0.008;

            // Rain animation
            const rp = rain.geometry.attributes.position.array;
            for (let i = 0; i < RAIN_COUNT; i++) {
                rp[i*3 + 1] -= rainVel[i];
                rp[i*3] -= rainVel[i] * 0.12;
                if (rp[i*3 + 1] < -5) {
                    rp[i*3 + 1] = 32;
                    rp[i*3] = (Math.random()-0.5)*60;
                }
            }
            rain.geometry.attributes.position.needsUpdate = true;

            // Scene-specific animations
            if (current === 'signal') {
                sceneA.rotation.y = Math.sin(t * 0.3) * 0.1 + mx * 0.07;
                beam.material.opacity = 0.16 + Math.sin(t * 2) * 0.04;
                sigGlow.intensity = 4.8 + Math.sin(t * 3.5) * 1.4;
                cloudMesh.material.opacity = 0.34 + Math.sin(t * 1.1) * 0.07;
            }

            if (current === 'mobile') {
                sceneB.rotation.y = 0.4 + Math.sin(t * 0.35) * 0.07 + mx * 0.08;
                const flicker = 0.75 + Math.sin(t * 7) * 0.25;
                jet.material.opacity = flicker;
                jetLight.intensity = flicker * 7;
            }

            if (current === 'logo') {
                bigBat.rotation.y = t * 0.4;
                bigBat.position.y = 0.6 + Math.sin(t * 0.85) * 0.4;
                logoGlow.intensity = 5.5 + Math.sin(t * 2.2) * 2;
            }

            // Smooth camera
            const ct = camTargets[current];
            targetCam.set(ct.pos[0] + mx * 0.7, ct.pos[1] + my * 0.35, ct.pos[2]);
            camera.position.lerp(targetCam, 0.045);
            camera.lookAt(0, ct.look[1], 0);

            redFill.intensity = 3.8 + Math.sin(t * 0.65) * 0.8;
            renderer.render(scene, camera);
        }

        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
