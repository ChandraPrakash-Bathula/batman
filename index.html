<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Batcave — Chandra Prakash Bathula</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%!important;height:100%!important}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:5;transition:opacity .05s}
#hud{position:fixed;inset:0;pointer-events:none;font-family:'Courier New',monospace;z-index:10}
#tl{position:absolute;top:24px;left:28px;font-size:11px;line-height:2;color:#550000;text-transform:uppercase;letter-spacing:1.5px}
#tl b{color:#dd0000}
#tr{position:absolute;top:24px;right:28px;font-size:10px;line-height:2;color:#440000;text-align:right;text-transform:uppercase;letter-spacing:1.5px}
#ct{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);text-align:center;animation:fi 2.5s ease}
#ct h1{font-size:clamp(20px,3.5vw,36px);color:#cc0000;letter-spacing:8px;text-transform:uppercase;font-weight:700;text-shadow:0 0 30px #880000,0 0 70px #440000}
#ct p{font-size:12px;color:#660000;letter-spacing:5px;margin-top:12px;text-transform:uppercase}
#btns{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;gap:14px;pointer-events:all}
.btn{font-family:'Courier New',monospace;font-size:11px;background:rgba(8,0,0,.95);color:#660000;border:2px solid #330000;padding:10px 22px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .3s}
.btn:hover{color:#ff4400;border-color:#880000}
.btn.act{color:#ff1100;border-color:#cc0000;background:rgba(20,0,0,.98);box-shadow:0 0 18px #660000}
#sc{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(150,0,0,.03) 4px,rgba(150,0,0,.03) 8px);pointer-events:none}
#vg{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 28%,rgba(0,0,0,.92) 100%);pointer-events:none}
@keyframes fi{from{opacity:0;transform:translate(-50%,-50%) scale(.88)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>

// Skyline

// Real Batman symbol
function makeRealBatSymbol(){
  const s=new THREE.Shape();

  s.bezierCurveTo(1.4,-0.7,1.6,-0.3,1.4,0.1);
  s.bezierCurveTo(1.2,0.4,0.9,0.3,0.8,0.6);
  s.bezierCurveTo(0.6,1.0,0.4,1.5,0.15,2.2);
  s.lineTo(0.6,3.0);s.lineTo(1.0,2.0);
  s.bezierCurveTo(1.4,1.5,2.2,1.8,3.0,2.2);
  s.bezierCurveTo(3.8,2.6,4.4,2.2,4.2,1.5);
  s.bezierCurveTo(4.0,0.9,3.4,0.7,2.9,0.8);
  s.bezierCurveTo(2.5,0.9,2.1,0.6,1.8,0.3);
  s.bezierCurveTo(1.5,0.0,1.3,-0.2,1.0,-0.2);
  s.bezierCurveTo(0.7,-0.2,0.4,-0.3,0,-0.5);
  s.bezierCurveTo(-0.4,-0.3,-0.7,-0.2,-1.0,-0.2);
  s.bezierCurveTo(-1.3,-0.2,-1.5,0.0,-1.8,0.3);
  s.bezierCurveTo(-2.1,0.6,-2.5,0.9,-2.9,0.8);
  s.bezierCurveTo(-3.4,0.7,-4.0,0.9,-4.2,1.5);
  s.bezierCurveTo(-4.4,2.2,-3.8,2.6,-3.0,2.2);
  s.bezierCurveTo(-2.2,1.8,-1.4,1.5,-1.0,2.0);
  s.lineTo(-0.6,3.0);s.lineTo(-0.15,2.2);
  s.bezierCurveTo(-0.4,1.5,-0.6,1.0,-0.8,0.6);
  s.bezierCurveTo(-0.9,0.3,-1.2,0.4,-1.4,0.1);
  s.bezierCurveTo(-1.6,-0.3,-1.4,-0.7,-1.0,-0.9);
  s.bezierCurveTo(-0.7,-1.1,-0.3,-0.9,0,-0.5);
  return s;
}

// SCENE A: Bat Signal
const sA=new THREE.Group();
sA.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(.65,.95,1.3,12),new THREE.MeshStandardMaterial({color:0x111111,roughness:.5,metalness:.8})),{position:new THREE.Vector3(0,-2.3,0),castShadow:true}));

pl.position.y=.15;pl.castShadow=true;sA.add(pl);
const hs=new THREE.Mesh(new THREE.CylinderGeometry(1.2,1.2,.85,28),new THREE.MeshStandardMaterial({color:0x111111,emissive:0x550000,emissiveIntensity:.6,metalness:.92,roughness:.18}));
hs.position.y=2.45;hs.castShadow=true;sA.add(hs);
const lns=new THREE.Mesh(new THREE.CircleGeometry(1.1,32),new THREE.MeshStandardMaterial({color:0x330000,emissive:0xcc0000,emissiveIntensity:2.5,roughness:.05}));
lns.position.set(0,2.9,0);lns.rotation.x=-Math.PI/2;sA.add(lns);
sA.add(Object.assign(new THREE.Mesh(new THREE.TorusGeometry(1.2,.09,8,28),new THREE.MeshStandardMaterial({color:0x2a2a2a,metalness:.95})),{position:new THREE.Vector3(0,2.45,0)}));

beamCone.position.y=14;beamCone.rotation.x=Math.PI;sA.add(beamCone);

const coreCone=new THREE.Mesh(new THREE.ConeGeometry(2.5,22,24,1,true),coreMat);
coreCone.position.y=14;coreCone.rotation.x=Math.PI;sA.add(coreCone);
const cldMat=new THREE.MeshBasicMaterial({color:0x330000,transparent:true,opacity:.48,side:THREE.BackSide});
const cld=new THREE.Mesh(new THREE.SphereGeometry(7.5,20,10),cldMat);
cld.position.set(0,25,0);cld.scale.set(2.6,.42,1.5);sA.add(cld);

batSil.scale.set(2.0,2.0,1);batSil.position.set(0,21.5,.3);sA.add(batSil);

const sgL2=new THREE.PointLight(0x880000,5,50);sgL2.position.set(0,14,0);sA.add(sgL2);
sA.position.y=-.5;scene.add(sA);

// SCENE B: Batmobile
const sB=new THREE.Group();sB.visible=false;
const bCarMat=new THREE.MeshStandardMaterial({color:0x080808,roughness:.12,metalness:.99});
const bRedMat=new THREE.MeshStandardMaterial({color:0x1a0000,roughness:.3,metalness:.9});
const bDkMat=new THREE.MeshStandardMaterial({color:0x060606,roughness:.4,metalness:.88});
const hull=new THREE.Mesh(new THREE.BoxGeometry(7.2,.72,2.7),bCarMat);hull.position.y=0;hull.castShadow=true;sB.add(hull);
const nose=new THREE.Mesh(new THREE.CylinderGeometry(0,.44,2.8,5),bCarMat);nose.rotation.z=-Math.PI/2;nose.position.set(4.8,0,0);nose.castShadow=true;sB.add(nose);
const eng=new THREE.Mesh(new THREE.BoxGeometry(3.8,.6,1.9),bDkMat);eng.position.set(-.4,.65,0);eng.castShadow=true;sB.add(eng);
const ckp=new THREE.Mesh(new THREE.SphereGeometry(.82,22,14,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color:0x080000,roughness:.04,metalness:.96,transparent:true,opacity:.88}));
ckp.position.set(.2,.74,0);ckp.scale.set(1.9,.95,1);ckp.castShadow=true;sB.add(ckp);
const turb=new THREE.Mesh(new THREE.CylinderGeometry(.68,.4,2,18),bRedMat);turb.rotation.z=Math.PI/2;turb.position.set(-4.3,.12,0);turb.castShadow=true;sB.add(turb);
[-.3,.4].forEach(ox=>{const tr=new THREE.Mesh(new THREE.TorusGeometry(.68,.06,10,24),new THREE.MeshStandardMaterial({color:0x2a2a2a,metalness:.95}));tr.rotation.y=Math.PI/2;tr.position.set(-4.3+ox,.12,0);sB.add(tr);});
const jMat=new THREE.MeshBasicMaterial({color:0xff2200,transparent:true,opacity:.95});
const jt=new THREE.Mesh(new THREE.SphereGeometry(.46,14,14),jMat);jt.position.set(-5.4,.12,0);sB.add(jt);
const jCoreMat=new THREE.MeshBasicMaterial({color:0xffaa00,transparent:true,opacity:.98});
const jCore=new THREE.Mesh(new THREE.SphereGeometry(.22,10,10),jCoreMat);jCore.position.set(-5.4,.12,0);sB.add(jCore);
const jTrailMat=new THREE.MeshBasicMaterial({color:0xcc2200,transparent:true,opacity:.38,side:THREE.DoubleSide});
const jTrail=new THREE.Mesh(new THREE.ConeGeometry(.55,3.5,16,1,true),jTrailMat);jTrail.rotation.z=Math.PI/2;jTrail.position.set(-7,.12,0);sB.add(jTrail);
const jL=new THREE.PointLight(0xff4400,16,18);jL.position.set(-5.5,.12,0);sB.add(jL);
const jL2=new THREE.PointLight(0xff2200,7,30);jL2.position.set(-8,.12,0);sB.add(jL2);
[-1.15,1.15].forEach(z=>{const fS=new THREE.Shape();fS.moveTo(0,0);fS.lineTo(-2.5,0);fS.lineTo(-2.5,1.3);fS.bezierCurveTo(-2.0,1.8,-1.0,2.0,0,0);const fin=new THREE.Mesh(new THREE.ShapeGeometry(fS),bCarMat);fin.position.set(-1.4,.36,z);fin.castShadow=true;sB.add(fin);});
[-1.05,1.05].forEach((z,i)=>{const ws=new THREE.Shape();ws.moveTo(0,0);ws.bezierCurveTo(.5,.3,1.1,.8,2.0,.55);ws.bezierCurveTo(1.5,.1,.9,.2,.5,.08);ws.lineTo(0,0);const sp2=new THREE.Mesh(new THREE.ShapeGeometry(ws),bDkMat);sp2.position.set(.4,.74,z);if(i===0)sp2.rotation.y=Math.PI;sB.add(sp2);});
sB.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(1.6,.07,2.9),bRedMat),{position:new THREE.Vector3(3.3,-.29,0)}));
[-0.85,0.85].forEach(z=>{const lm=new THREE.Mesh(new THREE.SphereGeometry(.17,10,10),new THREE.MeshBasicMaterial({color:0xff3300,transparent:true,opacity:.96}));lm.position.set(4.3,.12,z);sB.add(lm);const ll=new THREE.PointLight(0xff2200,4,11);ll.position.copy(lm.position);sB.add(ll);});
[-0.8,0.8].forEach(z=>{const gs=new THREE.Mesh(new THREE.BoxGeometry(5,.04,.08),new THREE.MeshBasicMaterial({color:0x880000,transparent:true,opacity:.7}));gs.position.set(0,-.36,z);sB.add(gs);});
sB.add(Object.assign(new THREE.PointLight(0xcc0000,5,8),{position:new THREE.Vector3(0,-1,0)}));
[[2.3,1.45],[2.3,-1.45],[-1.9,1.45],[-1.9,-1.45]].forEach(([x,z])=>{
  const tire=new THREE.Mesh(new THREE.CylinderGeometry(.72,.72,.44,22),new THREE.MeshStandardMaterial({color:0x080808,roughness:.95,metalness:.1}));tire.rotation.x=Math.PI/2;tire.position.set(x,-.36,z);tire.castShadow=true;sB.add(tire);
  const rim2=new THREE.Mesh(new THREE.CylinderGeometry(.45,.45,.46,8),new THREE.MeshStandardMaterial({color:0x1e1e1e,metalness:.96,roughness:.14}));rim2.rotation.x=Math.PI/2;rim2.position.set(x,-.36,z);sB.add(rim2);
  const hub=new THREE.Mesh(new THREE.CylinderGeometry(.19,.19,.48,6),new THREE.MeshStandardMaterial({color:0x1a0000,metalness:.99}));hub.rotation.x=Math.PI/2;hub.position.set(x,-.36,z);sB.add(hub);
});
sB.position.set(0,-.15,0);sB.rotation.y=.28;scene.add(sB);

// SCENE C: 3D Bat Logo
const sC=new THREE.Group();sC.visible=false;
const lMat=new THREE.MeshStandardMaterial({color:0x0f0f0f,roughness:.1,metalness:.99,emissive:0xaa0000,emissiveIntensity:.9});
const bLogo=new THREE.Mesh(new THREE.ExtrudeGeometry(makeRealBatSymbol(),{depth:.4,bevelEnabled:true,bevelThickness:.1,bevelSize:.07,bevelSegments:6}),lMat);
bLogo.scale.set(2.6,2.6,2.6);bLogo.position.set(0,-2.6,0);bLogo.castShadow=true;sC.add(bLogo);
const base=new THREE.Mesh(new THREE.CylinderGeometry(5.5,5.5,.18,48),new THREE.MeshStandardMaterial({color:0x0a0000,roughness:.05,metalness:.99,emissive:0x880000,emissiveIntensity:.5}));
base.position.y=-3.1;sC.add(base);
const lgL=new THREE.PointLight(0xff0000,14,22);lgL.position.set(0,1,3.5);sC.add(lgL);

[4.5,5.8,7.2].forEach((r,i)=>{const rng=new THREE.Mesh(new THREE.TorusGeometry(r,.06,8,90),new THREE.MeshBasicMaterial({color:i===0?0x990000:i===1?0x550000:0x2a0000,transparent:true,opacity:.65-i*.15}));rng.rotation.x=Math.PI/2+i*.45;sC.add(rng);});
const emGeo=new THREE.BufferGeometry(),emP=new Float32Array(180*3);
for(let i=0;i<180;i++){const a=Math.random()*Math.PI*2,rd=3.5+Math.random()*5.5;emP[i*3]=Math.cos(a)*rd;emP[i*3+1]=(Math.random()-.5)*6;emP[i*3+2]=Math.sin(a)*rd*.55;}
emGeo.setAttribute('position',new THREE.BufferAttribute(emP,3));
sC.add(new THREE.Points(emGeo,new THREE.PointsMaterial({color:0xcc2200,size:.13,transparent:true,opacity:.82})));
const gDisc=new THREE.Mesh(new THREE.CircleGeometry(7,52),new THREE.MeshBasicMaterial({color:0x330000,transparent:true,opacity:.4,side:THREE.DoubleSide}));
gDisc.rotation.x=-Math.PI/2;gDisc.position.y=-3.2;sC.add(gDisc);
sC.position.set(0,1.2,0);scene.add(sC);

// Lightning system
const lGrp=new THREE.Group();scene.add(lGrp);
const activeBolts=[];
function createBolt(x1,y1,z1,x2,y2,z2,segs,spread){
  const pts=[];
  for(let i=0;i<=segs;i++){const t=i/segs;pts.push(new THREE.Vector3(x1+(x2-x1)*t+(i>0&&i<segs?(Math.random()-.5)*spread:0),y1+(y2-y1)*t+(i>0&&i<segs?(Math.random()-.5)*spread*.25:0),z1+(z2-z1)*t+(i>0&&i<segs?(Math.random()-.5)*spread*.5:0)));}
  const bolt=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xaaaaff,transparent:true,opacity:1}));
  if(spread>0.8&&Math.random()>.45){
    const bi=Math.floor(segs*.3+Math.random()*segs*.4);const bp=pts[bi];
    const br=new THREE.Line(new THREE.BufferGeometry().setFromPoints([bp,new THREE.Vector3(bp.x+(Math.random()-.5)*5,bp.y-Math.random()*9,bp.z+(Math.random()-.5)*3)]),new THREE.LineBasicMaterial({color:0x8888ff,transparent:true,opacity:.65}));
    lGrp.add(br);setTimeout(()=>lGrp.remove(br),130);
  }
  return bolt;
}
let lTimer=0,nextL=2+Math.random()*3;
function triggerLightning(){
  activeBolts.forEach(b=>lGrp.remove(b));activeBolts.length=0;
  const count=1+Math.floor(Math.random()*2);
  for(let i=0;i<count;i++){
    const sx=(Math.random()-.5)*32,ex=sx+(Math.random()-.5)*9;
    const b=createBolt(sx,36,(Math.random()-.5)*18,ex,-3.5,(Math.random()-.5)*12,14+Math.floor(Math.random()*8),2.8);
    lGrp.add(b);activeBolts.push(b);
  }
  lLight.intensity=28+Math.random()*18;
  flashEl.style.opacity='0.2';
  setTimeout(()=>{lLight.intensity=0;flashEl.style.opacity='0';},85);
  setTimeout(()=>{lLight.intensity=14;flashEl.style.opacity='0.09';},110);
  setTimeout(()=>{lLight.intensity=0;flashEl.style.opacity='0';},195);
  setTimeout(()=>{activeBolts.forEach(b=>lGrp.remove(b));activeBolts.length=0;},210);
  nextL=1.5+Math.random()*4;
}

// Switcher
let cur='signal';
const CT={signal:{p:[0,5.5,18],l:[0,3,0]},mobile:{p:[4,2.5,14],l:[0,.5,0]},logo:{p:[0,1.5,13],l:[0,1,0]}};
function setScene(n){cur=n;sA.visible=n==='signal';sB.visible=n==='mobile';sC.visible=n==='logo';document.querySelectorAll('.btn').forEach(b=>b.classList.remove('act'));document.getElementById({signal:'b1',mobile:'b2',logo:'b3'}[n]).classList.add('act');}
window.setScene=setScene;

let mx=0,my=0;
window.addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-.5)*2;my=-(e.clientY/innerHeight-.5)*2;});
window.addEventListener('touchmove',e=>{mx=(e.touches[0].clientX/innerWidth-.5)*2;my=-(e.touches[0].clientY/innerHeight-.5)*2;},{passive:true});

let t=0;const tPos=new THREE.Vector3(),cDir=new THREE.Vector3(),tDir=new THREE.Vector3();
function animate(){
  requestAnimationFrame(animate);t+=.008;
  for(let i=0;i<RC;i++){rP[i*3+1]-=rV[i];rP[i*3]-=rV[i]*.15;if(rP[i*3+1]<-5){rP[i*3+1]=42;rP[i*3]=(Math.random()-.5)*80;}}
  rain.geometry.attributes.position.needsUpdate=true;
  lTimer+=.008;if(lTimer>=nextL){lTimer=0;triggerLightning();}
  if(cur==='signal'){sA.rotation.y=Math.sin(t*.28)*.14+mx*.08;beamCone.material.opacity=.2+Math.sin(t*2)*.06;coreCone.material.opacity=.1+Math.sin(t*2.1)*.04;sgL.intensity=9+Math.sin(t*3.5)*3.5;sgL2.intensity=4+Math.sin(t*2)*1.5;cld.material.opacity=.44+Math.sin(t*1.1)*.09;batSil.position.y=21.5+Math.sin(t*.5)*.5;sp.target.position.set(Math.sin(t*.22)*2.5,0,0);}
  if(cur==='mobile'){sB.rotation.y=.28+Math.sin(t*.38)*.09+mx*.07;const fl=.68+Math.sin(t*7)*.32;jMat.opacity=fl;jCoreMat.opacity=Math.min(1,fl+.05);jTrailMat.opacity=.22+fl*.18;jL.intensity=fl*18;jL2.intensity=fl*8;jL.color.setRGB(.95+Math.sin(t*9)*.05,.08,0);sB.children.forEach(c=>{if(c.geometry&&c.geometry.type==='CylinderGeometry'&&c.position.y<-.2&&Math.abs(c.position.z)>1.2){c.rotation.z+=.06;}});}
  if(cur==='logo'){bLogo.rotation.y=t*.35;bLogo.position.y=-2.6+Math.sin(t*.85)*.55;lgL.intensity=12+Math.sin(t*2.2)*5;lgL3.intensity=7+Math.sin(t*1.8+1)*3;gDisc.material.opacity=.35+Math.sin(t*1.5)*.14;sC.children.forEach((c,i)=>{if(c.geometry&&c.geometry.type==='TorusGeometry'){c.rotation.z=t*(.28+i*.13);c.rotation.x=Math.PI/2+Math.sin(t*.4+i)*.32;}});}
  const ct=CT[cur];tPos.set(ct.p[0]+mx*.9,ct.p[1]+my*.45,ct.p[2]);cam.position.lerp(tPos,.04);
  cam.getWorldDirection(cDir);tDir.set(ct.l[0],ct.l[1],ct.l[2]).sub(cam.position).normalize();cDir.lerp(tDir,.05);cam.lookAt(cam.position.clone().add(cDir));
  aFill.intensity=4.5+Math.sin(t*.7)*1.3;rim.intensity=1.0+Math.sin(t*.5)*.4;
  renderer.render(scene,cam);
}
animate();
window.addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();});
</script>
</body>
